name: citations

# Weekly (+ on-demand) refresh of data/citations.json from Semantic Scholar,
# committed back only when something changed. Runs server-side so visitors never
# hit the API. Optional repo secret S2_API_KEY raises the rate limit; without it
# the script still works (with backoff) and just keeps prior values on failure.
on:
  schedule:
    - cron: '0 7 * * 1'   # Mondays 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: citations
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Fetch citation counts
        env:
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
        run: node tools/fetch-citations.mjs
      - name: Commit if changed
        run: |
          if git diff --quiet -- data/citations.json; then
            echo "No citation changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/citations.json
            git commit -m "chore: update citation counts [skip ci]"
            git push
          fi
